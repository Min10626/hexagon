<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa-Core Conquest</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Orbitron & Black Han Sans) -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-black-han { font-family: 'Black Han Sans', sans-serif; font-weight: normal; letter-spacing: 0.05em; }

        .bg-cyber-grid {
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 28px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 2px;
            box-shadow: 0 0 15px #00ffff;
            transition: transform 0.1s, background 0.3s;
            clip-path: polygon(0 10%, 100% 0, 100% 90%, 0 100%);
        }
        .custom-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #ffffff;
        }

        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 255, 0.6); }

        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
        .animate-fadeInRight { animation: fadeInRight 0.3s ease-out; }
        
        /* 유저 턴일 때만 hover 효과 적용을 위한 클래스 */
        .user-turn .hex-group:hover polygon {
            stroke: #06b6d4; /* cyan-500 */
            fill: rgba(8, 145, 178, 0.2); /* cyan-900/20 */
        }
        .user-turn .hex-group:hover circle {
            fill: #22d3ee; /* cyan-400 */
        }
        
        /* 1:1 대전 시 플레이어 2(오렌지) 턴일 때 hover 효과 */
        .p2-turn .hex-group:hover polygon {
            stroke: #f97316; /* orange-500 */
            fill: rgba(234, 88, 12, 0.2); /* orange-600/20 */
        }
        .p2-turn .hex-group:hover circle {
            fill: #fb923c; /* orange-400 */
        }
    </style>
</head>
<body class="bg-[#05050a] text-gray-200 font-mono overflow-hidden">

    <!-- === 모드 선택 화면 === -->
    <div id="mode-screen" class="flex flex-col items-center justify-center h-screen w-full relative overflow-hidden bg-cyber-grid">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-cyan-500/10 blur-[150px] rounded-full pointer-events-none"></div>
        
        <div class="relative z-10 flex flex-col items-center">
            <p class="text-cyan-500/50 tracking-[0.5em] text-sm mb-2 font-bold animate-pulse">PROTOCOL: INITIATION</p>
            <h1 class="font-orbitron text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-cyan-300 to-blue-600 mb-16 tracking-widest uppercase drop-shadow-[0_0_25px_rgba(0,255,255,0.4)] text-center">
                Hexa-Core
                <span class="block text-3xl md:text-5xl text-gray-100 mt-2 tracking-[0.3em] drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">Conquest</span>

        </div>

        <div class="w-full max-w-md bg-black/40 p-1 relative shadow-[0_0_50px_rgba(0,0,0,1)] backdrop-blur-md z-10 border border-cyan-900/30">
            <div class="absolute -top-1 -left-1 w-6 h-6 border-t-2 border-l-2 border-cyan-500"></div>
            <div class="absolute -top-1 -right-1 w-6 h-6 border-t-2 border-r-2 border-cyan-500"></div>
            <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-2 border-l-2 border-cyan-500"></div>
            <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-2 border-r-2 border-cyan-500"></div>

                    <div class="absolute inset-0 bg-cyan-500 translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-300 ease-in-out opacity-20"></div>
                    <span class="relative z-10 flex flex-col items-center justify-center gap-1">

    <!-- === 메인 메뉴 화면 (AI 난이도 선택) === -->
    <div id="menu-screen" class="hidden flex-col items-center justify-center h-screen w-full relative overflow-hidden bg-cyber-grid">
        <button onclick="exitTerminal()" class="absolute top-6 left-6 z-30 px-3 py-1 border border-cyan-900/50 bg-[#080810]/80 text-cyan-500 text-xs font-bold tracking-widest hover:bg-cyan-900/40 hover:text-cyan-300 transition-colors flex items-center gap-2 backdrop-blur-sm">

            <h1 class="font-orbitron text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-cyan-300 to-blue-600 mb-16 tracking-widest uppercase drop-shadow-[0_0_25px_rgba(0,255,255,0.4)] text-center">

            <div class="absolute -top-1 -right-1 w-6 h-6 border-t-2 border-r-2 border-cyan-500"></div>
            <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-2 border-l-2 border-cyan-500"></div>

    <!-- === 게임 플레이 화면 === -->

            <h1 class="font-orbitron text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-gray-500 to-gray-300 mb-8 tracking-[0.4em] uppercase opacity-50">

            <div class="relative w-full max-w-[600px] aspect-square">
                <svg id="svg-board" viewBox="-250 -250 500 500" class="w-full h-full overflow-visible">
                    <defs>
                        <filter id="glow-user" x="-50%" y="-50%" width="200%" height="200%">

                            <feMerge>

        </div>

        <!-- 오른쪽: 시스템 로그 터미널 -->
        <div id="terminal-panel" class="w-full md:w-80 md:h-full h-64 border-t md:border-t-0 md:border-l border-cyan-900/50 bg-[#080810]/95 p-5 flex flex-col relative overflow-hidden shadow-[-10px_0_30px_rgba(0,0,0,0.5)] z-10 animate-fadeInRight">
            <div class="absolute inset-0 scanlines pointer-events-none opacity-40"></div>

                    <div class="w-2 h-2 bg-cyan-400 rounded-sm animate-pulse shadow-[0_0_8px_#00ffff]"></div>
                    TERMINAL_LOG
                </h3>
                <span class="text-[10px] text-gray-600 font-bold">v1.0.4</span>
            </div>
            
            <div id="terminal-logs" class="flex-1 overflow-y-auto space-y-2 text-xs md:text-sm pr-2 custom-scrollbar relative z-10 font-mono">
                <!-- 로그 출력 영역 -->
            </div>

            <!-- 현재 턴 상태 표시 -->
            <div class="mt-4 p-4 border border-cyan-900/50 bg-black/60 flex flex-col gap-1 relative z-10 backdrop-blur-sm">
                <div class="flex justify-between items-center w-full mb-1">
                    <span class="text-gray-500 text-[10px] uppercase tracking-[0.2em] font-bold">Sys.Status</span>
                    <span class="flex gap-1">
                        <span id="status-user-dot" class="block w-1.5 h-1.5 rounded-full bg-cyan-500 animate-ping"></span>
                        <span id="status-robot-dot" class="block w-1.5 h-1.5 rounded-full bg-gray-700"></span>
                    </span>
                </div>
                <span id="status-text" class="font-black text-sm tracking-widest uppercase text-cyan-400 drop-shadow-[0_0_5px_#00ffff]">
                    Awaiting Input_
                </span>
            </div>
        </div>
    </div>

    <!-- === 게임 로직 (Vanilla JS) === -->
    <script>
        // --- 상수 및 설정 ---
        const BOARD_RADIUS = 4;
        const HEX_SIZE = 22;
        const WIN_CONDITION = 5;
        const AXES = [[1, 0], [0, 1], [1, -1]];
        
        const DIFFICULTY_LEVELS = ['매우 쉬움', '쉬움', '보통', '어려움', '매우 어려움', '극악'];
        const DIFF_COLORS = [
            'text-cyan-300 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]',
            'text-blue-400 drop-shadow-[0_0_10px_rgba(96,165,250,0.8)]',
            'text-indigo-400 drop-shadow-[0_0_10px_rgba(129,140,248,0.8)]',
            'text-fuchsia-400 drop-shadow-[0_0_10px_rgba(232,121,249,0.8)]',
            'text-rose-500 drop-shadow-[0_0_10px_rgba(244,63,94,0.8)]',
            'text-red-600 drop-shadow-[0_0_15px_rgba(220,38,38,1)] animate-pulse'
        ];

        function getHexPoints(size) {
            const points = [];
            for (let i = 0; i < 6; i++) {
                const angle_rad = (Math.PI / 180) * (60 * i - 30);
                points.push(`${size * Math.cos(angle_rad)},${size * Math.sin(angle_rad)}`);
            }
            return points.join(' ');
        }
        const HEX_POINTS = getHexPoints(HEX_SIZE - 1);
        const INNER_HEX_POINTS = getHexPoints(HEX_SIZE * 0.45);

        // --- 전역 상태 변수 ---
        let difficulty = 2;
        let board = {};
        let turn = 'user';
        let winner = null;
        let logs = [];
        let isTerminalOpen = true;
        let gameMode = 'ai'; // 'ai' 또는 'local'
        let p1Name = 'Player 1';
        let p2Name = 'Player 2';

        // --- DOM 엘리먼트 ---
        const uiModeScreen = document.getElementById('mode-screen');
        const uiNameScreen = document.getElementById('name-screen');
        const uiMenuScreen = document.getElementById('menu-screen');
        const uiGameScreen = document.getElementById('game-screen');
        const uiDiffText = document.getElementById('difficulty-text');
        const uiDiffSlider = document.getElementById('difficulty-slider');
        const uiGridContainer = document.getElementById('hex-grid-container');
        const uiBoardContainer = document.getElementById('board-container');
        const uiLogs = document.getElementById('terminal-logs');
        const uiStatusUserDot = document.getElementById('status-user-dot');
        const uiStatusRobotDot = document.getElementById('status-robot-dot');
        const uiStatusText = document.getElementById('status-text');
        const uiWinnerOverlay = document.getElementById('winner-overlay');
        const uiWinnerText = document.getElementById('winner-text');
        const uiTermPanel = document.getElementById('terminal-panel');
        const uiToggleIndicator = document.getElementById('toggle-indicator');
        const uiToggleText = document.getElementById('toggle-text');
        const uiP1Input = document.getElementById('p1-input');
        const uiP2Input = document.getElementById('p2-input');

        // --- 초기화 및 UI 렌더링 ---
        function updateDifficulty() {
            difficulty = parseInt(uiDiffSlider.value);
            uiDiffText.innerText = DIFFICULTY_LEVELS[difficulty];
            // 색상 클래스 재할당 (기존 색상 제거 후 새 색상 추가)
            uiDiffText.className = `font-black-han text-5xl md:text-6xl transition-all duration-300 ${DIFF_COLORS[difficulty]}`;
        }

        function initBoard() {
            board = {};
            for (let q = -BOARD_RADIUS; q <= BOARD_RADIUS; q++) {
                for (let r = -BOARD_RADIUS; r <= BOARD_RADIUS; r++) {
                    if (Math.abs(q + r) <= BOARD_RADIUS) {
                        board[`${q},${r}`] = null;
                    }
                }
            }
            winner = null;
            turn = 'user';
            renderBoard();
            renderStatus();
            uiWinnerOverlay.style.display = 'none';
        }

        function selectMode(mode) {
            gameMode = mode;
            uiModeScreen.style.display = 'none';
            if (mode === 'ai') {
                p1Name = 'USER';
                p2Name = 'ROBOT';
                uiMenuScreen.style.display = 'flex';
            } else {
                uiP1Input.value = '';
                uiP2Input.value = '';
                uiNameScreen.style.display = 'flex';
            }
        }

        function confirmNames(isSkip) {
            if (isSkip) {
                p1Name = 'P1';
                p2Name = 'P2';
            } else {
                const input1 = uiP1Input.value.trim();
                const input2 = uiP2Input.value.trim();
                p1Name = input1 || 'P1';
                p2Name = input2 || 'P2';
            }
            startGame();
        }

        function startGame() {
            uiNameScreen.style.display = 'none';
            uiMenuScreen.style.display = 'none';
            uiGameScreen.style.display = 'flex';
            
            initBoard();
            logs = [];
            addLog('[SYSTEM] Hexa-Core Conquest 시스템 부팅 완료.');
            
            if (gameMode === 'local') {
                addLog(`[SYSTEM] 1:1 로컬 대전 모드 활성화.`);
                addLog(`[SYSTEM] ${p1Name}(Cyan) 턴 대기 중.`);
            } else {
                addLog(`[SYSTEM] 전투 인스턴스 생성 중...`);
                addLog(`[SYSTEM] 설정된 난이도: [${DIFFICULTY_LEVELS[difficulty]}]`);
                addLog(`[SYSTEM] ${p1Name}(Cyan) 턴 대기 중.`);
            }
        }

        function restartGame() {
            initBoard();
            if (gameMode === 'local') {
                addLog(`[SYSTEM] 1:1 대전 보드 초기화 완료.`);
            } else {
                addLog(`[SYSTEM] 보드 초기화 완료. 난이도: [${DIFFICULTY_LEVELS[difficulty]}]`);
            }
        }

        function exitTerminal() {
            uiGameScreen.style.display = 'none';
            uiMenuScreen.style.display = 'none';
            uiNameScreen.style.display = 'none';
            uiModeScreen.style.display = 'flex';
            if(!isTerminalOpen) toggleTerminal(); // 터미널 닫혀있으면 다시 열기
        }

        function toggleTerminal() {
            isTerminalOpen = !isTerminalOpen;
            if (isTerminalOpen) {
                uiTermPanel.style.display = 'flex';
                uiToggleIndicator.className = 'w-2 h-2 bg-cyan-500 rounded-sm';
                uiToggleText.innerText = 'HIDE_LOG';
            } else {
                uiTermPanel.style.display = 'none';
                uiToggleIndicator.className = 'w-2 h-2 bg-gray-600 rounded-sm';
                uiToggleText.innerText = 'SHOW_LOG';
            }
        }

        function addLog(msg) {
            logs.push(msg);
            renderLogs();
        }

        function renderLogs() {
            uiLogs.innerHTML = logs.map(log => {
                let colorClass = 'text-gray-500';
                
                // 로그 분석을 통해 P1, P2 색상을 동적으로 구분
                if (log.startsWith(`[${p1Name}]`) || log.includes('USER')) {
                    colorClass = 'text-cyan-300 drop-shadow-[0_0_2px_rgba(0,255,255,0.5)]';
                } else if (log.startsWith(`[${p2Name}]`) || log.includes('ROBOT')) {
                    colorClass = 'text-orange-400 drop-shadow-[0_0_2px_rgba(255,100,0,0.5)]';
                } else if (log.includes('!!!')) {
                    colorClass = 'text-red-400 font-bold bg-red-900/20 px-1 inline-block';
                }

                return `<div class="animate-fadeIn leading-relaxed ${colorClass}">
                    <span class="opacity-40 text-xs mr-2">&gt;</span>${log}
                </div>`;
            }).join('');
            uiLogs.scrollTop = uiLogs.scrollHeight;
        }

        function renderStatus() {
            if (turn === 'user') {
                uiBoardContainer.classList.add('user-turn');
                uiBoardContainer.classList.remove('p2-turn');
                uiStatusUserDot.className = 'block w-1.5 h-1.5 rounded-full bg-cyan-500 animate-ping';
                uiStatusRobotDot.className = 'block w-1.5 h-1.5 rounded-full bg-gray-700';
                uiStatusText.className = 'font-black text-sm tracking-widest uppercase text-cyan-400 drop-shadow-[0_0_5px_#00ffff]';
                uiStatusText.innerText = gameMode === 'local' ? `${p1Name} Turn` : 'Awaiting Input_';
            } else {
                uiBoardContainer.classList.remove('user-turn');
                uiBoardContainer.classList.add('p2-turn');
                uiStatusUserDot.className = 'block w-1.5 h-1.5 rounded-full bg-gray-700';
                uiStatusRobotDot.className = 'block w-1.5 h-1.5 rounded-full bg-orange-500 animate-ping';
                uiStatusText.className = 'font-black text-sm tracking-widest uppercase text-orange-500 drop-shadow-[0_0_5px_#ff6400]';
                uiStatusText.innerText = gameMode === 'local' ? `${p2Name} Turn` : 'Calculating...';
            }
        }

        function renderBoard() {
            let html = '';
            for (const [coord, owner] of Object.entries(board)) {
                const [q, r] = coord.split(',').map(Number);
                const x = HEX_SIZE * Math.sqrt(3) * (q + r / 2);
                const y = HEX_SIZE * (3 / 2) * r;

                let fill = 'rgba(10, 10, 20, 0.6)';
                let stroke = '#1e1e2f';
                let innerFill = 'none';
                let filter = '';
                let cursor = 'cursor-pointer';
                let isHoverable = (!owner && !winner && (gameMode === 'local' || turn === 'user'));

                if (owner === 'user') {
                    fill = 'rgba(0, 255, 255, 0.1)'; stroke = '#008888';
                    innerFill = '#00ffff'; filter = 'url(#glow-user)'; cursor = 'cursor-default';
                } else if (owner === 'robot') {
                    fill = 'rgba(255, 100, 0, 0.1)'; stroke = '#883300';
                    innerFill = '#ff6400'; filter = 'url(#glow-robot)'; cursor = 'cursor-default';
                }

                // 이벤트 부착을 위해 string literal 생성 (onClick 대신 인라인 onclick 사용)
                let clickAttr = isHoverable ? `onclick="handleTileClick(${q}, ${r})"` : '';
                let groupClass = `hex-group transition-all duration-300 ${cursor}`;

                let innerShape = owner 
                    ? `<polygon points="${INNER_HEX_POINTS}" fill="${innerFill}" filter="${filter}" class="transition-all duration-500" />`
                    : `<circle cx="0" cy="0" r="1.5" fill="#2a2a4a" class="transition-colors" />`;

                html += `
                    <g transform="translate(${x}, ${y})" class="${groupClass}" ${clickAttr}>
                        <polygon points="${HEX_POINTS}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" class="transition-all duration-300" />
                        ${innerShape}
                    </g>
                `;
            }
            uiGridContainer.innerHTML = html;
        }

        // --- 핵심 로직 (승리 판정 및 AI) ---
        function checkWin(currentBoard, q, r, player) {
            for (let [dq, dr] of AXES) {
                let count = 1;
                let nq = q + dq, nr = r + dr;
                while (currentBoard[`${nq},${nr}`] === player) { count++; nq += dq; nr += dr; }
                nq = q - dq; nr = r - dr;
                while (currentBoard[`${nq},${nr}`] === player) { count++; nq -= dq; nr -= dr; }
                if (count >= WIN_CONDITION) return true;
            }
            return false;
        }

        function getLineLength(b, q, r, dq, dr, player) {
            let count = 0;
            let nq = q + dq, nr = r + dr;
            while (b[`${nq},${nr}`] === player) { count++; nq += dq; nr += dr; }
            return count;
        }

        function evaluateMove(b, q, r) {
            let score = 0;
            score += (10 - (Math.abs(q) + Math.abs(r) + Math.abs(q + r)) / 2);

            for (let [dq, dr] of AXES) {
                let rTotal = getLineLength(b, q, r, dq, dr, 'robot') + getLineLength(b, q, r, -dq, -dr, 'robot') + 1;
                let uTotal = getLineLength(b, q, r, dq, dr, 'user') + getLineLength(b, q, r, -dq, -dr, 'user') + 1;

                if (rTotal >= 5) score += 100000;
                else if (rTotal === 4) score += 10000;
                else if (rTotal === 3) score += 100;
                else if (rTotal === 2) score += 10;

                if (uTotal >= 5) score += 50000;
                else if (uTotal === 4) score += 5000;
                else if (uTotal === 3) score += 50;
                else if (uTotal === 2) score += 5;
            }
            return score;
        }

        function getAIMove() {
            const emptyCoords = Object.keys(board).filter(key => board[key] === null);
            if (emptyCoords.length === 0) return null;

            const randomChances = [1.0, 0.7, 0.4, 0.15, 0.0, 0.0];
            if (Math.random() < randomChances[difficulty]) {
                return emptyCoords[Math.floor(Math.random() * emptyCoords.length)];
            }

            let bestScore = -1;
            let bestMoves = [];

            emptyCoords.forEach(coord => {
                const [q, r] = coord.split(',').map(Number);
                let score = evaluateMove(board, q, r);
                
                if (difficulty !== 5) score += Math.random() * (5 - difficulty);
                else score += Math.random() * 0.1;

                if (score > bestScore) {
                    bestScore = score; bestMoves = [coord];
                } else if (Math.floor(score) === Math.floor(bestScore)) {
                    bestMoves.push(coord);
                }
            });

            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        // --- 상호작용 및 턴 관리 ---
        function handleTileClick(q, r) {
            if (winner || board[`${q},${r}`]) return;
            if (gameMode === 'ai' && turn !== 'user') return; // AI 모드일 땐 유저 턴에만 클릭 가능

            const currentPlayer = turn;
            board[`${q},${r}`] = currentPlayer;

            if (currentPlayer === 'user') {
                addLog(`[${p1Name}] 좌표 [${q}, ${r}] 점령 완료.`);
            } else {
                addLog(`[${p2Name}] 좌표 [${q}, ${r}] 점령 완료.`);
            }

            if (checkWin(board, q, r, currentPlayer)) {
                endGame(currentPlayer);
            } else {
                turn = currentPlayer === 'user' ? 'robot' : 'user';
                renderBoard();
                renderStatus();
                
                if (gameMode === 'ai' && turn === 'robot') {
                    processRobotTurn();
                }
            }
        }

        function processRobotTurn() {
            addLog('[ROBOT] 최적의 경로 분석 중...');
            
            setTimeout(() => {
                const targetCoord = getAIMove();
                
                if (!targetCoord) {
                    endGame('draw');
                    return;
                }

                const [q, r] = targetCoord.split(',').map(Number);
                board[`${q},${r}`] = 'robot';
                addLog(`[${p2Name}] 카운터 프로토콜 가동. 좌표 [${q}, ${r}] 방어 구축.`);

                if (checkWin(board, q, r, 'robot')) {
                    endGame('robot');
                } else {
                    turn = 'user';
                    renderBoard();
                    renderStatus();
                }
            }, 800);
        }

        function endGame(result) {
            winner = result;
            renderBoard();
            
            if(result === 'user') {
                const winMsg = gameMode === 'local' ? `!!! [SYSTEM] ${p1Name} 승리! !!!` : '!!! [SYSTEM] 유저 승리! 코어 해킹에 성공했습니다. !!!';
                addLog(winMsg);
                uiWinnerText.className = 'font-black-han text-5xl md:text-7xl mb-10 tracking-wider text-cyan-400 drop-shadow-[0_0_20px_#00ffff] uppercase';
                uiWinnerText.innerText = gameMode === 'local' ? `${p1Name} WINS` : 'ACCESS GRANTED';
            } else if (result === 'robot') {
                const winMsg = gameMode === 'local' ? `!!! [SYSTEM] ${p2Name} 승리! !!!` : '!!! [SYSTEM] 로봇 승리. 방화벽에 의해 차단되었습니다. !!!';
                addLog(winMsg);
                uiWinnerText.className = 'font-black-han text-5xl md:text-7xl mb-10 tracking-wider text-orange-500 drop-shadow-[0_0_20px_#ff6400] uppercase';
                uiWinnerText.innerText = gameMode === 'local' ? `${p2Name} WINS` : 'ACCESS DENIED';
            } else {
                addLog('[SYSTEM] 더 이상 공간이 없습니다. 무승부입니다.');
                uiWinnerText.className = 'font-black-han text-5xl md:text-7xl mb-10 tracking-wider text-gray-400 uppercase';
                uiWinnerText.innerText = 'DRAW MATCH';
            }
            
            uiWinnerOverlay.style.display = 'flex';
        }

        // --- 최초 실행 ---
        updateDifficulty(); // 난이도 초기 렌더링
    </script>
</body>
</html>
